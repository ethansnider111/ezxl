<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EZXL</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
:root,
:root[data-theme="light-green"]{
  --bg:#ffffff;--surface:#f7fdf8;--surface2:#eef9f0;
  --border:#c8e8cc;--border2:#b0d8b4;--text:#052e16;--muted:#5a8060;--faint:#fbfefb;
  --acc:#16a34a;--acc-dim:#15803d;--acc-bg:#f0fdf4;--acc-text:#14532d;
  --hk:#ea580c;--hk-bg:#fff7f0;--nv:#b45309;--nv-bg:#fef9f0;--logo-xl:#52b870;
}
:root[data-theme="dark-green"]{
  --bg:#060d08;--surface:#0b1410;--surface2:#0f1c14;
  --border:#1a2e20;--border2:#22382a;--text:#e8f4ec;--muted:#3a6047;--faint:#090f0b;
  --acc:#22c55e;--acc-dim:#14532d;--acc-bg:#051008;--acc-text:#86efac;
  --hk:#f97316;--hk-bg:#1c0e04;--nv:#eab308;--nv-bg:#1c1604;--logo-xl:#3ab870;
}
:root[data-theme="black"]{
  --bg:#080808;--surface:#161616;--surface2:#222;
  --border:#2a2a2a;--border2:#333;--text:#f0f0f0;--muted:#505050;--faint:#101010;
  --acc:#d8d8d8;--acc-dim:#444;--acc-bg:#141414;--acc-text:#111;
  --hk:#888;--hk-bg:#1a1a1a;--nv:#aaa;--nv-bg:#1a1a1a;--logo-xl:#909090;
}
:root[data-theme="gray"]{
  --bg:#2a2a2a;--surface:#363636;--surface2:#404040;
  --border:#4a4a4a;--border2:#555;--text:#f0f0f0;--muted:#888;--faint:#303030;
  --acc:#d0d0d0;--acc-dim:#666;--acc-bg:#303030;--acc-text:#111;
  --hk:#aaa;--hk-bg:#303030;--nv:#bbb;--nv-bg:#303030;--logo-xl:#1a1a1a;
}
:root[data-theme="white"]{
  --bg:#ffffff;--surface:#f0f0f0;--surface2:#e8e8e8;
  --border:#d0d0d0;--border2:#bbb;--text:#111;--muted:#999;--faint:#f8f8f8;
  --acc:#222;--acc-dim:#ccc;--acc-bg:#f0f0f0;--acc-text:#000;
  --hk:#555;--hk-bg:#ebebeb;--nv:#444;--nv-bg:#ebebeb;--logo-xl:#888;
}
:root[data-theme="dark-red"]{
  --bg:#100808;--surface:#180d0d;--surface2:#1e1010;
  --border:#2e1515;--border2:#3a1a1a;--text:#f0e8e8;--muted:#6b4040;--faint:#1a0e0e;
  --acc:#e03030;--acc-dim:#7f1d1d;--acc-bg:#1a0808;--acc-text:#fca5a5;
  --hk:#f97316;--hk-bg:#1c0e04;--nv:#eab308;--nv-bg:#1c1604;--logo-xl:#c04040;
}
:root[data-theme="dark-blue"]{
  --bg:#080c14;--surface:#0d1220;--surface2:#101828;
  --border:#1a2540;--border2:#233050;--text:#e8eef8;--muted:#3d5480;--faint:#0a1020;
  --acc:#3b82f6;--acc-dim:#1e3a8a;--acc-bg:#080f1e;--acc-text:#93c5fd;
  --hk:#f97316;--hk-bg:#1c0e04;--nv:#eab308;--nv-bg:#1c1604;--logo-xl:#5a9cf0;
}
:root[data-theme="light-red"]{
  --bg:#ffffff;--surface:#fdf8f8;--surface2:#f9f0f0;
  --border:#eed8d8;--border2:#e0c0c0;--text:#3b0a0a;--muted:#b07070;--faint:#fefbfb;
  --acc:#dc2626;--acc-dim:#991b1b;--acc-bg:#fff5f5;--acc-text:#7f1d1d;
  --hk:#ea580c;--hk-bg:#fff7f0;--nv:#b45309;--nv-bg:#fef9f0;--logo-xl:#e87070;
}
:root[data-theme="light-blue"]{
  --bg:#ffffff;--surface:#f7f9fe;--surface2:#eef2fd;
  --border:#d4ddf8;--border2:#bfcdf5;--text:#0c1a4a;--muted:#6878b0;--faint:#fbfcff;
  --acc:#2563eb;--acc-dim:#1d4ed8;--acc-bg:#eff6ff;--acc-text:#1e3a8a;
  --hk:#ea580c;--hk-bg:#fff7f0;--nv:#b45309;--nv-bg:#fef9f0;--logo-xl:#7090e0;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;display:flex;flex-direction:column;height:100%}

/* ── HEADER ── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 10px;flex-shrink:0;display:flex;align-items:center;gap:8px;
}
.logo-wrap{flex:1;display:flex;align-items:center;gap:8px}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;font-weight:400;letter-spacing:2px;
  white-space:nowrap;position:relative;display:inline-flex;align-items:center;justify-content:center;
  border:1.5px solid var(--acc);border-radius:2px;
  padding:4px 5px 0 7px;
}
.logo::after{
  content:"";position:absolute;right:-4px;bottom:-4px;
  width:6px;height:6px;background:var(--acc);border:1.5px solid var(--bg);
}
.logo-ez{color:var(--text)}
.logo-xl{color:var(--logo-xl,var(--acc))}
.logo-tagline{font-size:9px;color:var(--muted);letter-spacing:0.1em;line-height:1.3;text-transform:uppercase}

/* ── TABS ── */
.tabs-row{display:flex;flex-shrink:0;border-bottom:1px solid var(--border)}
.search-icon-btn{
  background:var(--surface);border:none;border-right:1px solid var(--border);
  padding:7px 11px;cursor:pointer;transition:all .15s;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.search-icon-btn svg{stroke:var(--muted);transition:stroke .15s}
.search-icon-btn:hover svg{stroke:var(--text)}
.search-icon-btn.active{background:var(--faint);border-bottom:2px solid var(--text)}
.search-icon-btn.active svg{stroke:var(--text)}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);flex:1}
.tab{
  background:var(--surface);border:none;border-right:1px solid var(--border);
  padding:7px 3px;font-family:inherit;font-size:9px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;
  letter-spacing:0.03em;
}
.tab:last-child{border-right:none}
.tab:hover{color:var(--text);background:var(--faint)}
.tab.a-Numbers    {color:var(--acc);background:var(--acc-bg);border-bottom:2px solid var(--acc)}
.tab.a-LookupText {color:var(--acc);background:var(--acc-bg);border-bottom:2px solid var(--acc)}
.tab.a-Keys       {color:var(--nv);background:var(--nv-bg);border-bottom:2px solid var(--nv)}

/* ── TOOLBAR ── */
.toolbar{padding:7px 8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:5px}
.toolbar input{
  flex:1;background:var(--faint);border:1px solid var(--border2);
  border-radius:4px;padding:9px 11px;color:var(--text);
  font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;
}
.toolbar input::placeholder{color:var(--muted)}
.toolbar input:focus{border-color:var(--acc)}
.toolbar input.nv-inp:focus{border-color:var(--nv)}
.toolbar button{
  background:var(--acc);border:none;border-radius:4px;
  padding:5px 10px;font-family:inherit;font-size:10px;
  font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;
}
.toolbar button.nv-btn{background:var(--nv);color:#1c1604}
.toolbar button:hover{filter:brightness(1.1)}

/* ── LIST ── */
#list{flex:1;overflow-y:auto;padding:6px;transition:zoom .25s ease}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── FORMULA CARDS ── */
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;overflow:hidden;transition:border-color .12s}
.fcard.open{border-color:var(--acc)}
.fcard-head{padding:8px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:background .12s}
.fcard-head:hover{background:var(--faint)}
.fcard-name{font-weight:700;font-size:14px;color:var(--text);flex:1}
.fcard-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-top:1px}
.fcard-arrow{font-size:12px;color:var(--muted);transition:transform .15s;flex-shrink:0}
.fcard.open .fcard-arrow{transform:rotate(90deg);color:var(--acc)}
.fcard-body{display:none;padding:0 10px 10px;border-top:1px solid var(--border);background:var(--acc-bg)}
.fcard.open .fcard-body{display:block}
.syntax-line{font-size:11px;color:var(--acc-dim);padding:6px 0 8px;line-height:1.5;word-break:break-all;font-style:italic}

/* ── INPUTS ── */
.input-row{margin-bottom:5px}
.input-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.input-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.06em}
.input-actions{display:flex;gap:3px;align-items:center}
.input-with-chain{display:flex;gap:4px;align-items:center}
.btn-chain{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:4px;color:var(--muted);font-size:11px;
  cursor:pointer;padding:4px 7px;transition:all .15s;
  flex-shrink:0;line-height:1;
}
.btn-chain:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.btn-chain.active{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.btn-remove{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;padding:0 2px;transition:color .12s}
.btn-remove:hover{color:#f87171}
.input-field{
  background:var(--faint);border:1px solid var(--border2);
  border-radius:4px;padding:8px 10px;color:var(--text);
  font-family:inherit;font-size:13px;outline:none;
  transition:border-color .15s;width:100%;
}
.input-field:focus{border-color:var(--acc)}
.input-field::placeholder{color:var(--muted)}
.btn-pick{
  background:none;border:1px solid var(--border2);border-radius:3px;
  cursor:pointer;padding:0 5px;color:var(--muted);font-size:10px;
  transition:all .12s;flex-shrink:0;height:100%;display:flex;align-items:center;
}
.btn-pick:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.btn-pick.picking{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
/* inline pick confirm row */
.pick-confirm-row{
  display:none;margin-top:4px;align-items:center;gap:6px;
  background:var(--acc-bg);border:1px solid var(--acc);border-radius:4px;padding:5px 8px;
}
.pick-confirm-row.show{display:flex}
.pick-confirm-msg{flex:1;font-size:11px;color:var(--acc-dim);font-weight:700}
.pick-confirm-btn{
  background:var(--acc);border:none;border-radius:3px;
  padding:6px 10px;font-family:inherit;font-size:11px;font-weight:800;
  color:var(--acc-text);cursor:pointer;flex-shrink:0;
}
.pick-cancel-btn{
  background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:0 2px;flex-shrink:0;
}
.pick-cancel-btn:hover{color:var(--text)}
/* input-row position:relative for X positioning */
.input-row{position:relative;margin-bottom:7px}
.btn-remove{
  position:absolute;right:32px;top:-8px;
  background:none;border:none;
  color:var(--muted);font-size:11px;cursor:pointer;
  line-height:1;transition:color .12s;z-index:2;padding:2px 3px;
}
.btn-remove:hover{color:#f87171;}

.input-field.opt{border-style:dashed;opacity:.8}
.input-field.chained{border-color:var(--acc);background:var(--acc-bg);color:var(--acc-dim)}
.add-more-btn{
  background:none;border:1px dashed var(--border2);
  border-radius:4px;padding:4px;width:100%;
  color:var(--muted);font-family:inherit;font-size:9px;
  cursor:pointer;transition:all .12s;margin-top:2px;
}
.add-more-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── CHAIN BANNER ── */
#chain-banner{
  display:none;flex-shrink:0;
  background:var(--acc-bg);border-bottom:2px solid var(--acc);
  padding:8px 10px;
  flex-direction:column;gap:4px;
}
#chain-banner.show{display:flex}
.chain-banner-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chain-banner-msg{font-size:11px;color:var(--acc-dim);font-weight:700;letter-spacing:0.04em;flex:1}
.chain-banner-cancel{background:none;border:1px solid var(--border2);border-radius:3px;color:var(--muted);font-size:11px;cursor:pointer;padding:1px 7px;transition:all .12s}
.chain-banner-cancel:hover{border-color:var(--acc);color:var(--acc)}
.chain-banner-target{font-size:11px;color:var(--muted);font-style:italic}
.fcard.chain-target{cursor:crosshair;border-color:var(--acc-dim)!important}
.fcard.chain-target .fcard-head:hover{background:var(--acc-bg)!important}
.fcard.chain-target.has-output{border-color:var(--acc)!important}

/* ── PREVIEW ── */
.preview{
  background:transparent;border:none;border-top:1px solid var(--border2);
  padding:7px 2px;font-size:11px;
  color:var(--acc-dim);margin-bottom:8px;min-height:24px;
  word-break:break-all;line-height:1.5;font-weight:600;
  user-select:text;
}
.preview.empty{color:var(--muted);font-weight:400;font-style:italic;font-size:11px;letter-spacing:0.04em}

/* ── INSERT BUTTON ── */
.insert-btn{
  width:100%;background:var(--acc);border:none;border-radius:4px;
  padding:7px;font-family:inherit;font-size:11px;font-weight:800;
  color:var(--acc-text);cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.insert-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.insert-btn:active{transform:translateY(0)}
.insert-btn.ok{background:#166534;color:#86efac}
.insert-btn.err{background:#450a0a;color:#fca5a5}

/* ── ACTION CARDS ── */
.acard{
  display:flex;align-items:center;gap:10px;
  margin-bottom:3px;padding:7px 4px;
  transition:all .15s;border-radius:4px;
}
.acard.executable{
  cursor:pointer;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:9px 10px;margin-bottom:5px;
}
.acard.hk.executable:hover{border-color:var(--hk);background:var(--hk-bg)}
.acard.nv.executable:hover{border-color:var(--nv);background:var(--nv-bg)}
.acard-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;opacity:.7}
.acard.executable .acard-icon{opacity:1;font-size:15px;width:22px}
.acard-info{flex:1;min-width:0}
.acard-name{font-weight:700;font-size:12px;color:var(--text)}
.acard.executable .acard-name{font-size:13px}
.acard-desc{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.4}
.acard-key{font-size:11px;font-weight:700;border-radius:3px;padding:2px 6px;flex-shrink:0;white-space:nowrap;letter-spacing:0.03em}
.acard-key.hk{color:var(--hk);opacity:.8}
.acard-key.nv{color:var(--nv);opacity:.8}
.acard.executable .acard-key.hk{background:#1e0e04;border:1px solid #3a1e08;opacity:1}
.acard.executable .acard-key.nv{background:#1c1604;border:1px solid #3a2e08;opacity:1}
.acard.hk.executable:hover .acard-key{background:var(--hk);color:#1c0e04}
.acard.nv.executable:hover .acard-key{background:var(--nv);color:#1c1604}
/* group headers */
.action-group-label{
  font-size:8px;font-weight:800;letter-spacing:0.1em;
  color:var(--muted);padding:8px 2px 5px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
  opacity:.5;
}
/* ── EXPANDABLE SHORTCUT CARDS (Keys tab) ── */
.scard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;margin-bottom:5px;overflow:hidden;transition:border-color .12s;
}
.scard.open{border-color:var(--nv)}
.scard-head{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  cursor:pointer;user-select:none;transition:background .12s;
}
.scard-head:hover{background:var(--faint)}
.scard-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;opacity:.6}
.scard-info{flex:1;min-width:0}
.scard-name{font-weight:700;font-size:14px;color:var(--text)}
.scard-shortdesc{font-size:11px;color:var(--muted);margin-top:1px}
.scard-key{
  font-size:10px;font-weight:800;color:var(--nv);
  background:var(--nv-bg);border:1px solid var(--nv);
  border-bottom:2px solid var(--nv);border-radius:4px;
  padding:3px 8px;white-space:nowrap;flex-shrink:0;
}
.scard-arrow{font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0;margin-left:4px}
.scard.open .scard-arrow{transform:rotate(90deg);color:var(--nv)}
.scard-body{
  display:none;padding:10px 12px 12px;
  border-top:1px solid var(--border);background:var(--nv-bg);
}
.scard.open .scard-body{display:block}
.scard-fulldesc{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px}

/* non-executable shortcuts */
.ref-table{width:100%;border-collapse:collapse}
.ref-table tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.ref-table tr:last-child{border-bottom:none}
.ref-table tr:hover{background:var(--faint)}
@keyframes rowflash{0%{background:var(--acc-bg)}60%{background:var(--acc-bg)}100%{background:transparent}}
.ref-table tr.copied{animation:rowflash .6s ease-out forwards}
.ref-table td{padding:12px 8px;vertical-align:middle}
.ref-td-icon{width:32px;text-align:center;font-size:16px;opacity:.5}
.ref-td-name{font-size:13px;color:var(--text);font-weight:600;padding-left:2px}
.ref-td-key{text-align:right;padding-right:6px}
.ref-key{
  display:inline-block;
  font-size:12px;font-weight:800;letter-spacing:0.03em;
  color:var(--acc);
  background:var(--acc-bg);
  border:1px solid var(--acc-dim);
  border-bottom:3px solid var(--acc-dim);
  border-radius:5px;padding:5px 11px;
  white-space:nowrap;font-family:inherit;
}

/* ── ACTIONS SLIDE PANEL ── */
.actions-trigger{
  background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;padding:6px 12px;font-family:inherit;font-size:10px;
  font-weight:800;color:var(--text);letter-spacing:0.08em;
  transition:border-color .15s,background .15s;flex-shrink:0;
  -webkit-font-smoothing:antialiased;transform:translateZ(0);
}
.actions-trigger:hover{border-color:var(--text);background:var(--faint)}
.actions-trigger.active{border-color:var(--acc);color:var(--acc)}
#actions-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:2px solid var(--acc);
  border-radius:12px 12px 0 0;
  padding:0 12px 16px;
  transform:translate3d(0,100%,0);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:100;
  box-shadow:0 -4px 24px rgba(0,0,0,.35);
  will-change:transform;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
}
#actions-panel.open{transform:translate3d(0,0,0)}
/* ── TOOLS PANEL ── */
.tools-trigger{
  background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;padding:6px 12px;font-family:inherit;font-size:10px;
  font-weight:800;color:var(--text);letter-spacing:0.08em;
  transition:border-color .15s,background .15s;flex-shrink:0;
  -webkit-font-smoothing:antialiased;transform:translateZ(0);
}
.tools-trigger:hover{border-color:var(--text);background:var(--faint)}
.tools-trigger.active{border-color:var(--acc);color:var(--acc)}
#tools-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:2px solid var(--acc);
  border-radius:12px 12px 0 0;
  padding:0 12px 20px;
  transform:translate3d(0,100%,0);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:100;
  box-shadow:0 -4px 24px rgba(0,0,0,.35);
  will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
}
#tools-panel.open{transform:translate3d(0,0,0)}
.tools-panel-handle{width:40px;height:5px;background:var(--border2);border-radius:3px;margin:10px auto 14px;cursor:grab;transition:background .15s;}
.tools-panel-handle:hover{background:var(--muted)}
.tools-panel-title{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--acc);margin-bottom:12px;opacity:.8;}
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tool-tile{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:14px 12px;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;gap:6px;
}
.tool-tile:hover{border-color:var(--acc);background:var(--acc-bg);transform:translateY(-1px)}
.tool-tile-icon{font-size:18px;opacity:.7}
.tool-tile-name{font-size:11px;font-weight:700;color:var(--text)}
.tool-tile-key{font-size:11px;color:var(--muted)}
.actions-panel-handle{
  width:40px;height:5px;background:var(--border2);
  border-radius:3px;margin:10px auto 14px;cursor:grab;transition:background .15s;
}
.actions-panel-handle:hover{background:var(--muted)}
.actions-panel-title{
  font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--acc);
  margin-bottom:10px;opacity:.8;
}
.actions-panel-jump{
  display:flex;gap:6px;margin-bottom:12px;
}
.actions-panel-jump input{
  flex:1;background:var(--faint);border:1px solid var(--border2);
  border-radius:4px;padding:7px 10px;color:var(--text);
  font-family:inherit;font-size:11px;outline:none;transition:border-color .15s;
}
.actions-panel-jump input:focus{border-color:var(--nv)}
.actions-panel-jump input::placeholder{color:var(--muted)}
.actions-panel-jump button{
  background:var(--nv);border:none;border-radius:4px;
  padding:7px 12px;font-family:inherit;font-size:11px;font-weight:700;
  color:#1c1604;cursor:pointer;flex-shrink:0;
}
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-tile{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:14px 12px;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;gap:6px;
}
.action-tile:hover{border-color:var(--acc);background:var(--acc-bg);transform:translateY(-1px)}
.action-tile-icon{font-size:18px;opacity:.7}
.action-tile-name{font-size:11px;font-weight:700;color:var(--text)}
.action-tile-key{font-size:11px;color:var(--muted)}
#actions-overlay{display:none}
#actions-overlay.show{display:none}

/* ── SETTINGS BTN in header ── */
.settings-btn{
  background:none;border:1px solid var(--border);border-radius:4px;
  cursor:pointer;padding:5px 7px;
  transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:var(--text);
}
.settings-btn:hover{border-color:var(--text);background:var(--faint)}
.settings-btn.active{border-color:var(--acc);color:var(--acc)}

/* ── SETTINGS PANEL (slide-up overlay like Go To) ── */
#settings-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:2px solid var(--acc);
  border-radius:12px 12px 0 0;
  padding:0 12px 20px;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:100;
  box-shadow:0 -4px 24px rgba(0,0,0,.35);
  max-height:80vh;overflow-y:auto;
}
#settings-panel.open{transform:translate3d(0,0,0)}
.settings-panel-handle{
  width:40px;height:5px;background:var(--border2);
  border-radius:3px;margin:10px auto 14px;cursor:grab;transition:background .15s;
}
.settings-panel-handle:hover{background:var(--muted)}
.settings-panel-title{
  font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--acc);
  margin-bottom:12px;opacity:.8;
}
#settings-overlay{display:none}
#settings-overlay.show{display:none}
.settings-section{margin-bottom:18px}
.settings-section-title{
  font-size:11px;font-weight:800;letter-spacing:0.14em;color:var(--muted);
  padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px;
}
/* setting rows */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 10px;border-bottom:1px solid var(--border);gap:12px;
  border-radius:4px;transition:background .2s;min-height:60px;box-sizing:border-box;
}
.setting-row:hover{background:var(--faint)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;color:var(--text);font-weight:700;transition:color .25s}
.setting-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;transition:color .25s}
/* segmented control — fixed size so rows don't jump */
.seg{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden;flex-shrink:0;transition:border-color .25s}
.seg-btn{
  background:none;border:none;border-right:1px solid var(--border2);
  padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:background .2s,color .2s;white-space:nowrap;min-width:36px;
}
.seg-btn:last-child{border-right:none}
.seg-btn.active{background:var(--acc);color:var(--acc-text) !important;border-color:var(--acc);transition:background .2s,color .2s}
.seg-btn:hover:not(.active){color:var(--text);background:var(--faint)}
/* toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{
  position:absolute;inset:0;background:var(--border2);border-radius:18px;
  cursor:pointer;transition:background .25s;
}
.toggle-slider:before{
  content:"";position:absolute;width:12px;height:12px;border-radius:50%;
  background:#fff;left:3px;top:3px;transition:transform .25s,background .25s;
}
.toggle input:checked+.toggle-slider{background:var(--acc)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

.theme-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.theme-card{
  border:2px solid var(--border);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
}
.theme-card:hover{transform:translateY(-1px);border-color:var(--muted)}
.theme-card.selected{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.theme-preview{
  height:90px;padding:10px 10px 8px;
  display:flex;flex-direction:column;gap:6px;
}
.tp-row1{display:flex;gap:4px;align-items:center}
.tp-logo{height:7px;border-radius:2px;width:28px}
.tp-tag{height:5px;border-radius:2px;width:16px;opacity:.5}
.tp-tabs{display:flex;gap:3px;margin-top:1px}
.tp-tab{height:5px;border-radius:2px 2px 0 0}
.tp-tab.active{width:20px}
.tp-tab.inactive{width:14px;opacity:.35}
.tp-body{flex:1;border-radius:3px;display:flex;flex-direction:column;gap:3px;padding:4px 5px;margin-top:1px}
.tp-line{height:4px;border-radius:2px}
.tp-line.short{width:55%}
.theme-card-label{
  font-size:12px;font-weight:800;letter-spacing:0.05em;
  padding:6px 8px;border-top:1px solid;text-align:center;
}

#toast{
  position:fixed;bottom:12px;left:50%;
  transform:translateX(-50%) translateY(20px);
  padding:6px 16px;border-radius:20px;font-size:10px;font-weight:700;
  opacity:0;transition:all .2s;pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);background:#14532d;color:#dcfce7}
#toast.show.err{background:var(--acc-dim);color:var(--acc-text);border:1px solid var(--acc)}
#toast.show.info{background:#1e3a8a;color:#bfdbfe}
/* ── COMPACT MODE ── */
[data-compact="1"] .fcard-head{padding:5px 8px}
[data-compact="1"] .fcard-body{padding:0 8px 7px}
[data-compact="1"] .scard-head{padding:7px 10px}
[data-compact="1"] .input-row{margin-bottom:3px}
[data-compact="1"] #list{padding:4px}
[data-compact="1"] .fcard{margin-bottom:3px}
/* ── HIDE DESCRIPTIONS ── */
[data-nodesc="1"] .fcard-desc{display:none}
[data-nodesc="1"] .scard-shortdesc{display:none}
[data-nodesc="1"] .acard-desc{display:none}

.empty-msg{color:var(--muted);text-align:center;padding:28px 16px;font-size:13px}
/* ── SORT BAR ── */
.sort-bar{
  display:flex;align-items:center;justify-content:flex-end;padding:5px 10px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;
  position:relative;
}
.sort-toggle-btn{
  background:none;border:1px solid var(--border2);border-radius:4px;
  padding:5px 10px;font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;
}
.sort-toggle-btn:hover{color:var(--text);border-color:var(--muted)}
.sort-toggle-btn.active{background:var(--acc-bg);border-color:var(--acc);color:var(--acc-dim)}
.sort-popover{
  display:none;position:absolute;top:calc(100% + 4px);right:10px;z-index:50;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:160px;overflow:hidden;
}
.sort-popover.show{display:block}
.sort-pop-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;font-family:inherit;font-size:12px;font-weight:600;
  color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);gap:10px;
  transition:background .1s;
}
.sort-pop-item:last-child{border-bottom:none}
.sort-pop-item:hover{background:var(--faint)}
.sort-pop-item.active{color:var(--acc);background:var(--acc-bg)}
.sort-pop-dir{font-size:13px;opacity:.7;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo"><span class="logo-ez">EZ</span><span class="logo-xl">XL</span></span>
    <span class="logo-tagline">Your Excel<br>Helper</span>
  </div>
  <button class="tools-trigger" id="toolsBtn">TOOLS</button>
  <button class="actions-trigger" id="actionsBtn">GO TO</button>
  <button class="settings-btn" id="settingsBtn" title="Settings"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  <div style="flex:0 0 24px"></div>
</header>

<div class="tabs-row">
  <button class="search-icon-btn" id="searchIconBtn" title="Search all formulas">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="4"/>
      <line x1="9.5" y1="9.5" x2="13" y2="13"/>
    </svg>
  </button>
  <div class="tabs" id="tabs">
    <button class="tab a-Numbers"  data-cat="Numbers">∑ Numbers</button>
    <button class="tab"            data-cat="LookupText">⇄ Find</button>
    <button class="tab"            data-cat="Keys">⌨ Shortcuts</button>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <input id="toolbarInput" type="text" placeholder="Search…" autocomplete="off"/>
</div>

<div id="chain-banner">
  <div class="chain-banner-top">
    <span class="chain-banner-msg">⛓ Now click a formula to link it in</span>
    <button class="chain-banner-cancel" id="chainCancelBtn">✕ Stop</button>
  </div>
  <div class="chain-banner-target" id="chainBannerTarget"></div>
</div>

<div id="settings-overlay"></div>
<div id="settings-panel"><div class="settings-panel-handle"></div><div class="settings-panel-title">⚙ SETTINGS</div><div id="settings-content"></div></div>
<div id="tools-panel">
  <div class="tools-panel-handle"></div>
  <div class="tools-panel-title">🛠 TOOLS</div>
  <div class="tools-grid" id="toolsGrid"></div>
</div>
<div id="list"></div>
<div id="actions-overlay"></div>
<div id="actions-panel">
  <div class="actions-panel-handle"></div>
  <div class="actions-panel-title">⚡ GO TO</div>
  <div class="actions-panel-jump">
    <input id="jumpInput" type="text" placeholder="Type a cell, like A1 or B42…" autocomplete="off"/>
    <button id="jumpBtn">Go</button>
  </div>
  <div class="actions-grid" id="actionsGrid"></div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  FORMULA DATA
// ═══════════════════════════════════════════════════════
const F = {
  // ── NUMBERS TAB ──────────────────────────────────────
  Numbers: [
    { name:"SUM", desc:"Adds up a bunch of numbers.", syntax:"=SUM(n1, n2, ...)",
      params:[{label:"Value / Range", ph:"A1:A10", key:"n", variadic:true}],
      defaultExtras:{"n":1},
      build(s){const v=vv(s,"n");return v.length?`=SUM(${v.join(", ")})`:null}},

    { name:"AVERAGE", desc:"Finds the middle value of a group of numbers.", syntax:"=AVERAGE(n1, n2, ...)",
      params:[{label:"Value / Range", ph:"A1:A10", key:"n", variadic:true}],
      build(s){const v=vv(s,"n");return v.length?`=AVERAGE(${v.join(", ")})`:null}},

    { name:"MIN", desc:"Finds the smallest number.", syntax:"=MIN(n1, n2, ...)",
      params:[{label:"Value / Range", ph:"A1:A10", key:"n", variadic:true}],
      build(s){const v=vv(s,"n");return v.length?`=MIN(${v.join(", ")})`:null}},

    { name:"MAX", desc:"Finds the biggest number.", syntax:"=MAX(n1, n2, ...)",
      params:[{label:"Value / Range", ph:"A1:A10", key:"n", variadic:true}],
      build(s){const v=vv(s,"n");return v.length?`=MAX(${v.join(", ")})`:null}},

    { name:"COUNT", desc:"Counts cells containing numbers.", syntax:"=COUNT(value1, [value2], ...)",
      params:[{label:"Range", ph:"A1:A20", key:"n", variadic:true}],
      build(s){const v=vv(s,"n");return v.length?`=COUNT(${v.join(", ")})`:null}},

    { name:"COUNTA", desc:"Counts non-empty cells.", syntax:"=COUNTA(value1, [value2], ...)",
      params:[{label:"Range", ph:"A1:A20", key:"n", variadic:true}],
      build(s){const v=vv(s,"n");return v.length?`=COUNTA(${v.join(", ")})`:null}},

    { name:"COUNTBLANK", desc:"Counts empty cells in a range.", syntax:"=COUNTBLANK(range)",
      params:[{label:"Range", ph:"A1:A20", key:"rng"}],
      build(s){return s.rng?`=COUNTBLANK(${s.rng})`:null}},

    { name:"COUNTIF", desc:"Counts cells meeting a condition.", syntax:"=COUNTIF(range, criteria)",
      params:[
        {label:"Range", ph:"A1:A20", key:"rng"},
        {label:"Criteria", ph:'">100"', key:"crit"}],
      build(s){return req(s,"rng","crit")?`=COUNTIF(${s.rng}, ${s.crit})`:null}},

    { name:"COUNTIFS", desc:"Counts cells meeting multiple conditions.", syntax:"=COUNTIFS(range1, crit1, ...)",
      params:[
        {label:"Range", ph:"A:A", key:"r", variadic:true},
        {label:"Criteria", ph:'"Yes"', key:"c", variadic:true}],
      build(s){
        const rs=vv(s,"r"),cs=vv(s,"c");
        if(!rs.length||!cs.length)return null;
        return`=COUNTIFS(${rs.map((r,i)=>cs[i]?`${r}, ${cs[i]}`:null).filter(Boolean).join(", ")})`}},

    { name:"SUMIF", desc:"Sums cells that meet a condition.", syntax:"=SUMIF(range, criteria, [sum_range])",
      params:[
        {label:"Criteria range", ph:"A:A", key:"rng"},
        {label:"Criteria", ph:'"Yes"', key:"crit"},
        {label:"Sum range (opt)", ph:"B:B", key:"sum", opt:true}],
      build(s){return req(s,"rng","crit")?`=SUMIF(${s.rng}, ${s.crit}${s.sum?", "+s.sum:""})`:null}},

    { name:"SUMIFS", desc:"Sums cells meeting multiple conditions.", syntax:"=SUMIFS(sum_range, range1, crit1, ...)",
      params:[
        {label:"Sum range", ph:"C:C", key:"sum"},
        {label:"Criteria range", ph:"A:A", key:"r", variadic:true},
        {label:"Criteria", ph:'"Yes"', key:"c", variadic:true}],
      build(s){
        if(!s.sum)return null;
        const rs=vv(s,"r"),cs=vv(s,"c");
        if(!rs.length||!cs.length)return null;
        return`=SUMIFS(${s.sum}, ${rs.map((r,i)=>cs[i]?`${r}, ${cs[i]}`:null).filter(Boolean).join(", ")})`}},

    { name:"AVERAGEIF", desc:"Averages cells that meet a condition.", syntax:"=AVERAGEIF(range, criteria, [avg_range])",
      params:[
        {label:"Criteria range", ph:"A:A", key:"rng"},
        {label:"Criteria", ph:'">50"', key:"crit"},
        {label:"Average range (opt)", ph:"B:B", key:"avg", opt:true}],
      build(s){return req(s,"rng","crit")?`=AVERAGEIF(${s.rng}, ${s.crit}${s.avg?", "+s.avg:""})`:null}},

    { name:"ROUND", desc:"Rounds a number to however many decimals you want.", syntax:"=ROUND(number, digits)",
      params:[
        {label:"Number", ph:"3.14159", key:"num"},
        {label:"Decimal places", ph:"2", key:"dig"}],
      build(s){return req(s,"num","dig")?`=ROUND(${s.num}, ${s.dig})`:null}},

    { name:"ROUNDUP", desc:"Always rounds up away from zero.", syntax:"=ROUNDUP(number, digits)",
      params:[
        {label:"Number", ph:"3.141", key:"num"},
        {label:"Decimal places", ph:"2", key:"dig"}],
      build(s){return req(s,"num","dig")?`=ROUNDUP(${s.num}, ${s.dig})`:null}},

    { name:"ROUNDDOWN", desc:"Always rounds down toward zero.", syntax:"=ROUNDDOWN(number, digits)",
      params:[
        {label:"Number", ph:"3.999", key:"num"},
        {label:"Decimal places", ph:"2", key:"dig"}],
      build(s){return req(s,"num","dig")?`=ROUNDDOWN(${s.num}, ${s.dig})`:null}},

    { name:"INT", desc:"Rounds a number down to the nearest integer.", syntax:"=INT(number)",
      params:[{label:"Number", ph:"3.99", key:"num"}],
      build(s){return s.num?`=INT(${s.num})`:null}},

    { name:"MOD", desc:"Returns the remainder after division.", syntax:"=MOD(number, divisor)",
      params:[
        {label:"Number", ph:"10", key:"num"},
        {label:"Divisor", ph:"3", key:"div"}],
      build(s){return req(s,"num","div")?`=MOD(${s.num}, ${s.div})`:null}},

    { name:"ABS", desc:"Returns the absolute (positive) value.", syntax:"=ABS(number)",
      params:[{label:"Number or cell", ph:"A1", key:"num"}],
      build(s){return s.num?`=ABS(${s.num})`:null}},

    { name:"LARGE", desc:"Returns the Nth largest value in a range.", syntax:"=LARGE(array, k)",
      params:[
        {label:"Range", ph:"A1:A20", key:"arr"},
        {label:"Rank (1=largest)", ph:"1", key:"k"}],
      build(s){return req(s,"arr","k")?`=LARGE(${s.arr}, ${s.k})`:null}},

    { name:"SMALL", desc:"Returns the Nth smallest value in a range.", syntax:"=SMALL(array, k)",
      params:[
        {label:"Range", ph:"A1:A20", key:"arr"},
        {label:"Rank (1=smallest)", ph:"1", key:"k"}],
      build(s){return req(s,"arr","k")?`=SMALL(${s.arr}, ${s.k})`:null}},

    { name:"RANK", desc:"Returns the rank of a number within a list.", syntax:"=RANK(number, ref, [order])",
      params:[
        {label:"Number to rank", ph:"A1", key:"num"},
        {label:"Range of numbers", ph:"A1:A20", key:"ref"},
        {label:"Order: 0=desc, 1=asc (opt)", ph:"0", key:"ord", opt:true}],
      build(s){return req(s,"num","ref")?`=RANK(${s.num}, ${s.ref}${s.ord?", "+s.ord:""})`:null}},

    { name:"IF", desc:"Returns one value if true, another if false.", syntax:"=IF(test, value_if_true, value_if_false)",
      params:[
        {label:"Condition", ph:"A1>10", key:"test"},
        {label:"Value if TRUE", ph:'"Yes"', key:"t"},
        {label:"Value if FALSE", ph:'"No"', key:"f"}],
      build(s){return req(s,"test","t","f")?`=IF(${s.test}, ${s.t}, ${s.f})`:null}},

    { name:"IFS", desc:"Checks multiple conditions in order, returns first match.", syntax:"=IFS(test1, val1, test2, val2, ...)",
      params:[
        {label:"Condition", ph:"A1>10", key:"test", variadic:true},
        {label:"Value if true", ph:'"High"', key:"val", variadic:true}],
      build(s){
        const ts=vv(s,"test"),vs=vv(s,"val");
        if(!ts.length||!vs.length)return null;
        return`=IFS(${ts.map((t,i)=>vs[i]?`${t}, ${vs[i]}`:null).filter(Boolean).join(", ")})`}},

    { name:"IFERROR", desc:"Returns a fallback value if a formula errors.", syntax:"=IFERROR(value, fallback)",
      params:[
        {label:"Formula or value", ph:"A1/B1", key:"val"},
        {label:"Fallback if error", ph:'"N/A"', key:"err"}],
      build(s){return req(s,"val","err")?`=IFERROR(${s.val}, ${s.err})`:null}},

    { name:"AND", desc:"Checks if multiple things are ALL true.", syntax:"=AND(condition1, condition2, ...)",
      params:[{label:"Condition", ph:"A1>0", key:"c", variadic:true}],
      build(s){const v=vv(s,"c");return v.length?`=AND(${v.join(", ")})`:null}},

    { name:"OR", desc:"Checks if at least one thing is true.", syntax:"=OR(condition1, condition2, ...)",
      params:[{label:"Condition", ph:"A1>0", key:"c", variadic:true}],
      build(s){const v=vv(s,"c");return v.length?`=OR(${v.join(", ")})`:null}},

    { name:"NOT", desc:"Reverses a logical value.", syntax:"=NOT(logical)",
      params:[{label:"Condition or value", ph:"A1>10", key:"val"}],

// Combined arrays for the new merged tabs
const ACTIONS   = [...HOTKEYS,...NAVIGATION].filter(x=>x.executable&&x.action);
const SHORTCUTS = [...HOTKEYS,...NAVIGATION].filter(x=>!(x.executable&&x.action));
// ═══════════════════════════════════════════════════════
function req(s,...keys){return keys.every(k=>s[k])}
function vv(state,key){
  const v=[];
  if(state[key])v.push(state[key]);
  let i=1;
  while(Object.prototype.hasOwnProperty.call(state,key+"_"+i)){
    if(state[key+"_"+i])v.push(state[key+"_"+i]);i++;
  }
  return v;
}

// ═══════════════════════════════════════════════════════
//  PERSISTENT STATE
// ═══════════════════════════════════════════════════════
let cat = "Numbers";
let openFormula = null;
let searchOpen = false;
const inputState = {};
const extraInputs = {};
const S = {q:"", hq:"", nq:"", sq:""};
// usage tracking: counts how many times each formula name was inserted
const usageCount = {};
// sort state per tab: "default"|"alpha"|"used", dir: 1=asc -1=desc
const sortState = {Numbers:{mode:"default",dir:1}, LookupText:{mode:"default",dir:1}, Keys:{mode:"default",dir:1}};

// chainMode: { formulaName, key, labelText, append, originalOpen, sourceFormula }
// - formulaName/key: target field to inject into
// - append: true if field already had a value (will &-append)
// - originalOpen: formula that was open before chain started
// - sourceFormula: formula card the user clicked to chain FROM (null until picked)
let chainMode = null;

function enterChainMode(formulaName, key, labelText){
  const existing = inputState[formulaName]?.[key] || "";
  const append = existing.length > 0;
  chainMode = {formulaName, key, labelText, append, originalOpen: openFormula, sourceFormula: null};
  document.getElementById("chain-banner").classList.add("show");
  document.getElementById("chainBannerTarget").textContent =
    (append ? `→ append (&) into "${labelText}" of ${formulaName}` : `→ into "${labelText}" of ${formulaName}`);
  render(); // re-render so all cards get chain-target class
}

function cancelChainMode(){
  const orig = chainMode?.originalOpen ?? null;
  chainMode = null;
  openFormula = orig;
  document.getElementById("chain-banner").classList.remove("show");
  render();
}

// Called when user picks a formula card to chain FROM
function pickChainSource(sourceName){
  chainMode.sourceFormula = sourceName;
  openFormula = sourceName; // open that formula so user can fill values
  // show banner with a "cancel chain" option still visible
  document.getElementById("chain-banner").classList.add("show");
  document.getElementById("chainBannerTarget").textContent =
    `Fill in ${sourceName}, then click "Insert into formula"`;
  render();
}

// Called from the insert button when in chain source mode
function injectChainResult(result){
  const t = chainMode;
  if(!inputState[t.formulaName]) inputState[t.formulaName] = {};
  const existing = inputState[t.formulaName][t.key] || "";
  // when appending, strip the leading = from the new formula (only one = needed)
  const bare = result.startsWith("=") ? result.slice(1) : result;
  inputState[t.formulaName][t.key] = t.append && existing ? existing + "&" + bare : result;
  const orig = t.originalOpen;
  chainMode = null;
  openFormula = orig;
  document.getElementById("chain-banner").classList.remove("show");
  render();
  toast("⛓ Chained into " + t.formulaName);
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, type=""){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.className="show"+(type?" "+type:"");
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.className="",2200);
}

// ═══════════════════════════════════════════════════════
//  INSERT INTO CELL
// ═══════════════════════════════════════════════════════
async function insertFormula(formula){
  if(typeof Excel==="undefined"){
    navigator.clipboard.writeText(formula).catch(()=>{});
    toast("Copied to clipboard","info");
    return;
  }
  try{
    await Excel.run(async c=>{
      const cell=c.workbook.getSelectedRange();
      cell.load("address");
      await c.sync();
      cell.values=[[formula]];
      await c.sync();
      usageCount[f.name]=(usageCount[f.name]||0)+1;
      toast("↵ Inserted into "+cell.address.split("!").pop());
    });
  }catch(e){toast("Click on a cell in Excel first","err")}
}

// ═══════════════════════════════════════════════════════
//  RENDER ROUTER — split so typing doesn't destroy the input
// ═══════════════════════════════════════════════════════
function render(){
  renderToolbar();
  renderList();
}

function renderToolbar(){
  const toolbar=document.getElementById("toolbar");
  const sib=document.getElementById("searchIconBtn");
  if(sib) sib.classList.toggle("active",searchOpen);

  if(searchOpen){
    toolbar.innerHTML=`<input id="toolbarInput" type="text" placeholder="Search everything…" autocomplete="off"/>`;
    const inp=document.getElementById("toolbarInput");
    inp.value=S.sq;
    inp.oninput=e=>{S.sq=e.target.value;openFormula=null;renderList();};
    inp.focus();
  } else if(cat==="Numbers"||cat==="LookupText"){
    toolbar.innerHTML=`<input id="toolbarInput" type="text" placeholder="Search formulas…" autocomplete="off"/>`;
    const inp=document.getElementById("toolbarInput");
    inp.value=S.q;
    inp.oninput=e=>{S.q=e.target.value;openFormula=null;renderList();};
    renderSortBar();
  } else if(cat==="Keys"){
    toolbar.innerHTML=`<input id="toolbarInput" type="text" placeholder="Search shortcuts…" autocomplete="off"/>`;
    const inp=document.getElementById("toolbarInput");
    inp.value=S.hq;
    inp.oninput=e=>{S.hq=e.target.value;renderList();};
    renderSortBar();
  }
}

function renderSortBar(){
  let bar=document.getElementById("sort-bar");
  if(!bar){
    bar=document.createElement("div");
    bar.id="sort-bar";
    bar.className="sort-bar";
    const toolbar=document.getElementById("toolbar");
    toolbar.parentNode.insertBefore(bar,toolbar.nextSibling);
  }
  if(searchOpen){bar.style.display="none";return;}
  bar.style.display="flex";
  const ss=sortState[cat]||{mode:"default",dir:1};
  const modeLabel={default:"Default",used:"Most Used",alpha:"A–Z"}[ss.mode]||"Sort";
  const dirLabel=ss.dir===1?"↓":"↑";
  const isNonDefault=ss.mode!=="default"||ss.dir===-1;
  bar.innerHTML=`<button class="sort-toggle-btn${isNonDefault?" active":""}" id="sortToggleBtn">⇅ ${modeLabel} ${dirLabel}</button>
    <div class="sort-popover" id="sortPopover">
      ${[{id:"default",label:"Default"},{id:"used",label:"Most Used"},{id:"alpha",label:"A–Z"}]
        .map(m=>`<div class="sort-pop-item${ss.mode===m.id?" active":""}" data-sort="${m.id}">
          <span>${m.label}</span>
          <span class="sort-pop-dir">${ss.mode===m.id?dirLabel:""}</span>
        </div>`).join("")}
    </div>`;
  const toggleBtn=bar.querySelector("#sortToggleBtn");
  const popover=bar.querySelector("#sortPopover");
  toggleBtn.onclick=e=>{e.stopPropagation();popover.classList.toggle("show");};
  bar.querySelectorAll(".sort-pop-item").forEach(item=>item.onclick=e=>{
    e.stopPropagation();
    const ss2=sortState[cat]||{mode:"default",dir:1};
    if(ss2.mode===item.dataset.sort){ss2.dir*=-1;}else{ss2.mode=item.dataset.sort;ss2.dir=1;}
    sortState[cat]=ss2;
    // keep popover open — re-render it in place so user sees the change
    renderSortBar();renderList();
    // re-open popover after re-render
    const newPop=document.getElementById("sortPopover");
    if(newPop) newPop.classList.add("show");
  });
  // close on outside click (use capture so it fires after toggle btn click)
  setTimeout(()=>{
    document.addEventListener("click",function closePop(e){
      const pop=document.getElementById("sortPopover");
      if(pop && !pop.contains(e.target) && !document.getElementById("sortToggleBtn")?.contains(e.target)){
        pop.classList.remove("show");
        document.removeEventListener("click",closePop);
      }
    });
  },0);
}

function applySort(items, tabCat){
  const ss=sortState[tabCat]||{mode:"default",dir:1};
  let sorted=[...items];
  if(ss.mode==="alpha") sorted.sort((a,b)=>(a.name||a.key||"").localeCompare(b.name||b.key||""));
  else if(ss.mode==="used") sorted.sort((a,b)=>(usageCount[b.name]||0)-(usageCount[a.name]||0));
  // default: keep original order
  if(ss.dir===-1) sorted.reverse();
  return sorted;
}

function renderList(){
  const list=document.getElementById("list");
  if(searchOpen){
    renderSearchAll(list, S.sq);
  } else if(cat==="Numbers"||cat==="LookupText"){
    renderFormulas(list,applySort(F[cat],cat),S.q);
  } else if(cat==="Keys"){
    const q=S.hq.toLowerCase();
    const filtSc=SHORTCUTS.filter(h=>!q||h.name.toLowerCase().includes(q)||h.key.toLowerCase().includes(q));
    renderShortcuts(list,applySort(filtSc,"Keys"));
  }
}

function renderSearchAll(list, query){
  const q=query.toLowerCase();
  list.innerHTML="";

  // formulas
  const allF=[...F.Numbers,...F.LookupText];
  const matchedF=sortByRelevance(
    allF.filter(f=>!q||f.name.toLowerCase().includes(q)||f.desc.toLowerCase().includes(q)),
    q
  );

  // actions + shortcuts (treat as one pool)
  const allCmds=[...ACTIONS,...SHORTCUTS];
  const matchedC=allCmds.filter(c=>!q||c.name.toLowerCase().includes(q)||c.key.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));

  if(!matchedF.length&&!matchedC.length){
    list.innerHTML=`<div class="empty-msg">Nothing found for "${query}"</div>`;
    return;
  }

  if(matchedF.length){
    if(matchedC.length||q){
      const lbl=document.createElement("div");
      lbl.className="action-group-label";
      lbl.textContent="FORMULAS";
      list.appendChild(lbl);
    }
    // render each formula as a mini card (no inputs, just head + click to open)
    const sub=document.createElement("div");
    renderFormulas(sub,matchedF,q);
    list.appendChild(sub);
  }

  if(matchedC.length){
    const lbl=document.createElement("div");
    lbl.className="action-group-label";
    lbl.textContent="SHORTCUTS & BUTTONS";
    list.appendChild(lbl);

    // actions (executable)
    const matchedA=matchedC.filter(c=>c.executable&&c.action);
    if(matchedA.length) renderActionsGrouped({innerHTML:"",appendChild:el=>list.appendChild(el)},matchedA,"hk");

    // shortcuts (non-executable, copy on click)
    const matchedS=matchedC.filter(c=>!(c.executable&&c.action));
    if(matchedS.length){
      const table=document.createElement("table");
      table.className="ref-table";
      matchedS.forEach(item=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
          <td class="ref-td-icon">${item.icon}</td>
          <td class="ref-td-name">${item.name}<div style="font-size:9px;color:var(--muted);font-weight:400;margin-top:2px">${item.desc}</div></td>
          <td class="ref-td-key"><span class="ref-key">${item.key}</span></td>`;
        tr.style.cursor="pointer";
        tr.onclick=()=>{
          navigator.clipboard.writeText(item.key).catch(()=>{});
          tr.classList.remove("copied");void tr.offsetWidth;tr.classList.add("copied");
          toast("Copied "+item.key);
        };
        table.appendChild(tr);
      });
      list.appendChild(table);
    }
  }
}

// relevance sort: exact name > starts-with name > includes name > desc match
function sortByRelevance(items,query){
  if(!query)return items;
  const q=query.toLowerCase();
  const score=f=>{const n=f.name.toLowerCase();if(n===q)return 0;if(n.startsWith(q))return 1;if(n.includes(q))return 2;return 3;};
  return[...items].sort((a,b)=>score(a)-score(b));
}

// ═══════════════════════════════════════════════════════
//  RENDER FORMULAS
// ═══════════════════════════════════════════════════════
function renderFormulas(list, formulas, query){
  const q=query.toLowerCase();
  let items=formulas.filter(f=>!q||f.name.toLowerCase().includes(q)||f.desc.toLowerCase().includes(q));
  items=sortByRelevance(items,q);
  list.innerHTML="";
  if(!items.length){list.innerHTML=`<div class="empty-msg">No formulas found for "${query}"</div>`;return;}

  items.forEach(f=>{
    const isOpen=openFormula===f.name;
    if(!inputState[f.name])inputState[f.name]={};

    const card=document.createElement("div");
    const isChainSource = chainMode && chainMode.sourceFormula === f.name;
    const isChainPicking = chainMode && chainMode.sourceFormula === null;
    let cls="fcard"+(isOpen?" open":"");
    if(isChainPicking && !isChainSource) cls+=" chain-target";
    card.className=cls;
    card.innerHTML=`
      <div class="fcard-head">
        <div><div class="fcard-name">${f.name}</div><div class="fcard-desc">${f.desc}</div></div>
        <span class="fcard-arrow">▶</span>
      </div>
      ${isOpen?`<div class="fcard-body">
        <div class="syntax-line">${f.syntax}</div>
        <div class="inputs-section"></div>
        <div class="preview empty">preview will appear here</div>
        <button class="insert-btn"><span>↵</span> Add to my cell</button>
      </div>`:""}`;

    card.querySelector(".fcard-head").onclick=()=>{
      // chain mode: clicking a card picks it as the source formula to fill in
      if(chainMode && chainMode.sourceFormula === null){
        pickChainSource(f.name);
        return;
      }
      openFormula=openFormula===f.name?null:f.name;
      render();
    };

    if(isOpen){
      const section=card.querySelector(".inputs-section");
      const previewEl=card.querySelector(".preview");
      const insertBtn=card.querySelector(".insert-btn");

      // apply default extras (e.g. SUM gets 2 boxes)
      if(f.defaultExtras){
        Object.entries(f.defaultExtras).forEach(([key,count])=>{
          const sk=f.name+":"+key;
          if(!extraInputs[sk]) extraInputs[sk]=count;
        });
      }

      // set insert button label: chain source mode vs normal
      const isChainSourceCard = ()=> chainMode && chainMode.sourceFormula === f.name;
      const updateInsertLabel=()=>{
        insertBtn.innerHTML = isChainSourceCard()
          ? `<span>⛓</span> Insert into formula`
          : `<span>↵</span> Insert into cell`;
      };
      updateInsertLabel();

      const clearState=()=>{
        inputState[f.name]={};
        // reset extras to defaults only
        const params=f.params.filter(p=>p.variadic);
        params.forEach(p=>{
          const sk=f.name+":"+p.key;
          extraInputs[sk]=f.defaultExtras?.[p.key]||0;
        });
      };

      const saveValues=()=>{
        card.querySelectorAll(".input-field").forEach(inp=>{
          inputState[f.name][inp.dataset.key]=inp.value;
        });
      };

      const updatePreview=()=>{
        saveValues();
        const result=f.build({...inputState[f.name]});
        if(result){previewEl.textContent=result;previewEl.classList.remove("empty");}
        else{previewEl.textContent="your formula will appear here";previewEl.classList.add("empty");}
        updateInsertLabel();
      };

      const rebuildSection=()=>{
        saveValues();
        section.innerHTML=buildInputsHTML(f);
        bindSection();
        updatePreview();
      };

      const bindSection=()=>{
        // restore values
        card.querySelectorAll(".input-field").forEach(inp=>{
          const v=inputState[f.name][inp.dataset.key];
          if(v!==undefined)inp.value=v;
          if(v&&v.startsWith("="))inp.classList.add("chained");
          inp.oninput=()=>{inp.classList.remove("chained");updatePreview();};
        });
        // cell picker buttons
        card.querySelectorAll(".btn-pick").forEach(btn=>{
          btn.onclick=e=>{
            e.stopPropagation();
            const key=btn.dataset.key;
            const inp=card.querySelector(`.input-field[data-key="${key}"]`);
            if(!inp)return;
            // Show the cell-confirm banner targeting this input
            showPickBanner(inp, btn, updatePreview);
          };
        });
        // add-more
        card.querySelectorAll(".add-more-btn").forEach(btn=>{
          btn.onclick=e=>{
            e.stopPropagation();
            const sk=f.name+":"+btn.dataset.vkey;
            extraInputs[sk]=(extraInputs[sk]||0)+1;
            rebuildSection();
          };
        });
        // remove
        card.querySelectorAll(".btn-remove").forEach(btn=>{
          btn.onclick=e=>{
            e.stopPropagation();
            const vkey=btn.dataset.vkey;
            const idx=parseInt(btn.dataset.idx);
            const sk=f.name+":"+vkey;
            const count=extraInputs[sk]||0;
            for(let i=idx;i<count;i++){
              inputState[f.name][vkey+"_"+i]=inputState[f.name][vkey+"_"+(i+1)]||"";
            }
            delete inputState[f.name][vkey+"_"+count];
            if(count>0)extraInputs[sk]=count-1;
            rebuildSection();
          };
        });
        // chain button — enter chain mode
        card.querySelectorAll(".btn-chain").forEach(btn=>{
          btn.onclick=e=>{
            e.stopPropagation();
            const key=btn.dataset.key;
            const label=btn.dataset.label;
            enterChainMode(f.name, key, label);
          };
        });
      };

      section.innerHTML=buildInputsHTML(f);
      bindSection();
      updatePreview();

      insertBtn.onclick=async e=>{
        e.stopPropagation();
        saveValues();
        const result=f.build({...inputState[f.name]});
        if(!result){toast("Please fill in all the boxes first","err");return;}
        // chain source mode: inject into target field, don't write to Excel
        if(isChainSourceCard()){
          injectChainResult(result);
          return;
        }
        await insertFormula(result);
        insertBtn.innerHTML=`<span>✓</span> Inserted!`;
        insertBtn.classList.add("ok");
        setTimeout(()=>{
          clearState();
          render();
        },400);
      };
    }

    list.appendChild(card);
  });
}

function buildInputsHTML(f){
  let html="";
  const seen=new Set();
  f.params.forEach(p=>{
    if(p.variadic){
      if(seen.has(p.key))return;
      seen.add(p.key);
      const count=extraInputs[f.name+":"+p.key]||0;
      html+=inputRowHTML(f.name,p.label,p.key,p.ph,false,p.key,0);
      for(let i=1;i<=count;i++)
        html+=inputRowHTML(f.name,p.label,p.key+"_"+i,p.ph,false,p.key,i);
      html+=`<button class="add-more-btn" data-vkey="${p.key}">+ Add another ${p.label.replace(/ \(.+\)/,"").toLowerCase()}</button>`;
    } else {
      html+=inputRowHTML(f.name,p.label,p.key,p.ph,!!p.opt,null,null);
    }
  });
  return html;
}

function inputRowHTML(fname,label,key,ph,isOpt,variadicKey,idx){
  const removable=variadicKey&&idx>0;
  const currentVal=(inputState[fname]&&inputState[fname][key])||"";
  const isChained=currentVal.startsWith("=");
  const isActiveChain=chainMode&&chainMode.formulaName===fname&&chainMode.key===key;

  return`<div class="input-row">
    <div class="input-label-row">
      <span class="input-label">${label}${isOpt?' <span style="color:var(--muted);font-weight:400;font-style:italic">(opt)</span>':""}</span>
    </div>
    <div class="input-with-chain">
      <button class="btn-chain${isActiveChain?" active":""}" data-key="${key}" data-label="${label.replace(/"/g,"&quot;")}" title="Use another formula's result here">🔗</button>
      <input class="input-field${isOpt?" opt":""}${isChained?" chained":""}" data-key="${key}" placeholder="${ph}"/>
      <button class="btn-pick" data-key="${key}" title="Select a cell or range in Excel">⊞</button>
    </div>
    <div class="pick-confirm-row" data-pick-key="${key}">
      <span class="pick-confirm-msg">📍 Select cells in Excel, then confirm</span>
      <button class="pick-confirm-btn" data-pick-key="${key}">✓ Use Selection</button>

    </div>
    ${removable?`<button class="btn-remove" data-vkey="${variadicKey}" data-idx="${idx}">✕</button>`:""}
  </div>`;
}

function renderActionsGrouped(list, data, cls){
  list.innerHTML="";
  const exec=data.filter(d=>d.executable&&d.action);
  const ref=data.filter(d=>!(d.executable&&d.action));

  const makeLabel=(text,first=false)=>{
    const el=document.createElement("div");
    el.className="action-group-label"+(first?" first":"");
    el.textContent=text;
    return el;
  };

  const makeCard=(item)=>{
    const card=document.createElement("div");
    card.className=`acard ${cls} executable`;
    card.innerHTML=`
      <div class="acard-icon">${item.icon}</div>
      <div class="acard-info">
        <div class="acard-name">${item.name}</div>
        <div class="acard-desc">${item.desc}</div>
      </div>
      <div class="acard-key ${cls}">${item.key}</div>`;
    card.onclick=()=>{try{item.action();}catch(e){toast(item.key);}};
    return card;
  };

  const makeRefCard=(item)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="ref-td-icon">${item.icon}</td>
      <td class="ref-td-name">${item.name}</td>
      <td class="ref-td-key"><span class="ref-key">${item.key}</span></td>`;
    return tr;
  };

  if(exec.length){
    exec.forEach(item=>list.appendChild(makeCard(item)));
  }
  if(ref.length){
    if(exec.length){
      const label=document.createElement("div");
      label.className="action-group-label";
      label.textContent="⌨ SHORTCUTS";
      list.appendChild(label);
    }
    const table=document.createElement("table");
    table.className="ref-table";
    ref.forEach(item=>table.appendChild(makeRefCard(item)));
    list.appendChild(table);
  }
}

function applySettings(){

  const scales={S:0.82,M:1,L:1.25};
  const sc=scales[SETTINGS.textSize]||1;
  let sEl=document.getElementById("textsize-style");
  if(!sEl){sEl=document.createElement("style");sEl.id="textsize-style";document.head.appendChild(sEl);}
  // Only zoom the list content — settings panel stays fixed so buttons don't move under your finger
  sEl.textContent=sc===1?"":"#list,#sort-bar,#chain-banner{zoom:"+sc+"}";
  document.documentElement.setAttribute("data-compact", SETTINGS.compactCards?"1":"0");

function applyTheme(id){
  currentTheme = id;
  document.documentElement.setAttribute("data-theme", id);
  // Update the swatch and label in the header row without rebuilding everything
  const t = THEME_GROUPS.flatMap(g=>g.themes).find(x=>x.id===id);
  const descEl = document.querySelector("#settings-content .setting-desc");
  if(descEl && t){
    descEl.innerHTML = `<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${t.acc};border:1px solid ${t.brd2};vertical-align:middle;margin-right:6px"></span>${t.label}`;
  }
  // Update selected state on cards
  document.querySelectorAll(".theme-card").forEach(c=>c.classList.remove("selected"));
  document.querySelectorAll(".theme-card").forEach((c,i)=>{
    const allThemes = THEME_GROUPS.flatMap(g=>g.themes);
    if(allThemes[i]?.id===id) c.classList.add("selected");
  });
}

function showPickBanner(inp, btn, onDone){
  // find the pick-confirm-row in the same input-row
  const row = btn.closest(".input-row");
  if(!row) return;
  const confirmRow = row.querySelector(".pick-confirm-row");
  if(!confirmRow) return;
  btn.classList.add("picking");
  confirmRow.classList.add("show");

  const confirmBtn = confirmRow.querySelector(".pick-confirm-btn");
  const cancelBtn  = confirmRow.querySelector(".pick-cancel-btn");

  const cleanup = ()=>{
    btn.classList.remove("picking");
    confirmRow.classList.remove("show");
    confirmBtn.onclick = null;
    cancelBtn.onclick  = null;
  };

  confirmBtn.onclick = ()=>{
    Excel.run(async c=>{
      const r=c.workbook.getSelectedRange();
      r.load("address");
      await c.sync();
      const addr=r.address.replace(/^[^!]+!/,"");
      inp.value=addr;
      inp.classList.remove("chained");
      cleanup();
      onDone();
      toast("Picked "+addr,"info");
    }).catch(()=>{
      cleanup();
      toast("Click on a cell in Excel first","err");
    });
  };
  cancelBtn.onclick = cleanup;
}

// ── DRAG-TO-CLOSE HANDLES ──────────────────────────────
function makeHandleDraggable(handleEl, panelEl, closeFn){
  let startY=0, dragging=false;
  const THRESHOLD=40;

  function onStart(y){
    startY=y; dragging=true;
    panelEl.style.transition="none";
  }
  function onMove(y){
    if(!dragging)return;
    const dy=Math.max(0,y-startY);
    panelEl.style.transform=`translate3d(0,${dy}px,0)`;
  }
  function onEnd(y){
    if(!dragging)return;
    dragging=false;
    panelEl.style.transition="";
    panelEl.style.transform="";
    if(y-startY>THRESHOLD || y===startY) closeFn();
  }

  // mouse
  handleEl.addEventListener("mousedown",e=>{onStart(e.clientY);
    const mu=ev=>{onMove(ev.clientY);};
    const mu2=ev=>{onEnd(ev.clientY);document.removeEventListener("mousemove",mu);document.removeEventListener("mouseup",mu2);};
    document.addEventListener("mousemove",mu);
    document.addEventListener("mouseup",mu2);
  });
  // touch
  handleEl.addEventListener("touchstart",e=>{onStart(e.touches[0].clientY);},{passive:true});
  handleEl.addEventListener("touchmove",e=>{onMove(e.touches[0].clientY);},{passive:true});
  handleEl.addEventListener("touchend",e=>{onEnd(e.changedTouches[0].clientY);});
}

// jump input in actions panel
document.getElementById("jumpBtn").onclick=()=>{

// ── Auto-detect Office theme (dark vs light) ──────────────
function detectOfficeTheme(){
  try {
    if(typeof Office==="undefined" || !Office.context || !Office.context.officeTheme) return;
    const bg = Office.context.officeTheme.bodyBackgroundColor; // hex like "#1e1e1e"
    if(!bg) return;
    // Parse brightness of the background color
    const hex = bg.replace("#","");
    const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
    const brightness = (r*299 + g*587 + b*114) / 1000;
    const isDark = brightness < 128;
    const autoTheme = isDark ? "dark-green" : "light-green";
    if(autoTheme !== currentTheme){
      currentTheme = autoTheme;
      document.documentElement.setAttribute("data-theme", currentTheme);
    }
  } catch(e){ /* officeTheme not available, keep default */ }
}

document.documentElement.setAttribute("data-theme", currentTheme);

if(typeof Office!=="undefined"){
  Office.onReady(()=>{
    detectOfficeTheme();
    render();
  });
}else{
  render();
}
